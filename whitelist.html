<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist | Not Alone RP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14; --card:#121821; --text:#e6eef7; --muted:#9fb0c3;
  --accent:#ff2a2a; --accent2:#ff7a2a; --border:#1e2733; --input:#1a2230;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{min-height:100vh;background:radial-gradient(1200px 800px at 80% -10%,#1a2330 0%,var(--bg) 50%),var(--bg);color:var(--text)}
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);background:rgba(11,15,20,.7);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:24px;padding:12px 24px}
nav img{height:38px}
nav ul{list-style:none;display:flex;gap:18px;margin:0;padding:0}
nav a{color:var(--muted);text-decoration:none;font-weight:600;padding:8px 12px;border-radius:8px;transition:.2s}
nav a:hover,nav a[aria-current]{color:#fff;background:#1a2230}
.wrap{display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:1000px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:24px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
h1{text-align:center;font-size:clamp(32px,5vw,44px);font-weight:800;background:linear-gradient(90deg,#fff,#ffd1d1 50%,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px}
.sub{text-align:center;color:var(--muted);margin-bottom:28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
label{display:block;margin:14px 0 6px;font-weight:600;color:#d5e2f0}
input,textarea{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--input);color:#fff;font-size:15px;transition:.2s}
input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,42,42,.15)}
textarea{min-height:120px;resize:vertical}
.section{margin-top:28px;color:#fff;font-weight:700;font-size:18px;border-left:4px solid var(--accent);padding-left:12px;display:flex;align-items:center;gap:8px}
.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:12px}
.chk{background:#141c27;padding:12px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:.2s}
.chk:hover{background:#1a2230;border-color:#2a3545}
.chk input{width:auto}
button{width:100%;margin-top:28px;padding:16px;border:0;border-radius:14px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000;font-size:18px;font-weight:800;cursor:pointer;transition:.2s}
button:hover{filter:brightness(1.08);transform:translateY(-1px)}
#status{margin-top:20px;text-align:center}
.success{background:#0f2416;border:1px solid #1f4d2e;padding:15px;border-radius:12px;color:#b6f7c8}
.loading{background:#241f0f;border:1px solid #4d3d1f;padding:15px;border-radius:12px;color:#ffe6b6}
.badge{display:inline-block;margin:0 auto 12px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--muted);background:rgba(255,42,42,.08)}
</style>
</head>
<body>
<nav>
    <img src="logo.png" alt="Not Alone RP">
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="lore.html">Lore</a></li>
        <li><a href="regelwerk.html">Regelwerk</a></li>
        <li><a href="whitelist.html" aria-current="page">Whitelist</a></li>
    </ul>
</nav>

<div class="wrap">
<div class="card">
<div style="text-align:center"><span class="badge">Hardcore Survival RP</span></div>
<h1>NOT ALONE RP WHITELIST</h1>
<p class="sub">Bewirb dich jetzt für den Server – du bist nicht allein.</p>

<form id="whitelistForm" onsubmit="sendApplication(event)">

<div class="section">👤 Persönliche Angaben</div>
<div class="grid">
<div>
<label>IC Name</label>
<input id="icname" required>
</div>
<div>
<label>Discord mit #</label>
<input id="discord" required>
</div>
</div>

<label>Steam ID</label>
<input id="steamid" required>

<div class="section">🎭 RP Erfahrung</div>

<label>Wie lange spielst du bereits RP?</label>
<input id="rptime" placeholder="z.B. 3 Jahre">

<label>Auf welchen Servern/Spielen hast du RP-Erfahrung?</label>

<div class="checks">
<label class="chk"><input type="checkbox" name="rpgames" value="GTA RP"> GTA RP</label>
<label class="chk"><input type="checkbox" name="rpgames" value="SCUM RP"> SCUM RP</label>
<label class="chk"><input type="checkbox" name="rpgames" value="DayZ RP"> DayZ RP</label>
<label class="chk"><input type="checkbox" name="rpgames" value="Arma RP"> Arma RP</label>
<label class="chk"><input type="checkbox" name="rpgames" value="RedM RP"> RedM RP</label>
</div>

<div class="section">📝 Bewerbung</div>

<label>Beitrittsgrund</label>
<textarea id="reason" required></textarea>

<label>Charaktervorstellung</label>
<textarea id="character" required></textarea>

<label>Gewerbe (optional)</label>
<input id="business">

<div class="section">📜 Regelwerk</div>

<label style="display:flex;align-items:center;gap:10px;font-weight:500;margin-top:10px">
<input id="rules" type="checkbox" required style="width:18px;height:18px">
 Ich habe die Serverregeln gelesen und verstanden.
</label>

<button type="submit">Bewerbung absenden</button>
</form>

<div id="status"></div>
</div>
</div>

<script>
const WEBHOOK_URL="https://discord.com/api/webhooks/1517303263924584609/cWj4BC5HXUeaxcsCBxg1IY9NADU5ITnR5aSv69FwNu4FS64Gdb3apCrUj1NsfaDniknf";

async function sendApplication(e){
e.preventDefault();

document.getElementById("status").innerHTML='<div class="loading">⏳ Bewerbung wird gesendet...</div>';

const games=[];
document.querySelectorAll('input[name="rpgames"]:checked').forEach(x=>games.push(x.value));

const payload={
content:"<@&1517303649221480640>",
embeds:[{
title:"📋 Neue Not Alone RP Bewerbung",
color:16729344,
fields:[
{name:"IC Name",value:document.getElementById("icname").value},
{name:"Discord",value:document.getElementById("discord").value},
{name:"Steam ID",value:document.getElementById("steamid").value},
{name:"RP Erfahrung",value:document.getElementById("rptime").value || "-"},
{name:"RP Plattformen",value:games.join(", ") || "-"},
{name:"Beitrittsgrund",value:document.getElementById("reason").value},
{name:"Charaktervorstellung",value:document.getElementById("character").value},
{name:"Gewerbe",value:document.getElementById("business").value || "Keins"},
{name:"Regeln gelesen",value:document.getElementById("rules").checked ? "Ja":"Nein"}
],
timestamp:new Date().toISOString()
}]
};

try{
const r=await fetch(WEBHOOK_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

if(r.ok){
document.getElementById("whitelistForm").reset();
document.getElementById("status").innerHTML='<div class="success">✅ Bewerbung erfolgreich eingereicht. Das Team wurde benachrichtigt.</div>';
}else{
document.getElementById("status").innerHTML='<div class="loading">❌ Fehler beim Senden.</div>';
}
}catch(err){
document.getElementById("status").innerHTML='<div class="loading">❌ Webhook nicht erreichbar.</div>';
}
}
</script>
</body>
</html>
